# ============================================================
#  Nginx — Curador de Rarezas (web estática)
#  Este fichero lo instala setup-vps.sh en /etc/nginx/sites-available/curador
#  Los marcadores __SERVER_NAME__ y __APP_DIR__ se sustituyen automáticamente.
# ============================================================
server {
    listen 80;
    listen [::]:80;

    server_name __SERVER_NAME__;

    root __APP_DIR__;
    index index.html;

    # Seguridad básica
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache: el HTML no se cachea (para ver cambios al instante),
    # los assets pesados (script.js con la base de datos) sí, con revalidación.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # No servir ficheros internos del repo
    location ~ /\.(?!well-known) { deny all; }
    location ^~ /deploy/   { deny all; }
    location ^~ /scripts/  { deny all; }
    location ^~ /api/      { deny all; }
    location = /package.json { deny all; }
    location = /.env         { deny all; }

    # Página 404 → vuelve al inicio
    error_page 404 /index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
